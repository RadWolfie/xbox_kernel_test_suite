name: CI

on:
  push:
    paths-ignore:
      - '.github/*'
      - '.github/*_TEMPLATE/**'
      - '*.md'
      - '*.yml'
  pull_request:
    paths-ignore:
      - '.github/*'
      - '.github/*_TEMPLATE/**'
      - '*.md'
      - '*.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nxdk
        uses: actions/checkout@v2
        with:
          repository: XboxDev/nxdk
          submodules: recursive
      - name: Checkout xbox_kernel_test_suite
        uses: actions/checkout@v2
        with:
          path: projects/xbox_kernel_test_suite
      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install build-essential flex bison clang git clang-8 lldb-8 llvm-8 llvm-8-dev -y
          alias lld-link=lld-link-8.0
          alias clang=clang-8
      - name: Build
        working-directory: projects/xbox_kernel_test_suite
        run: make -j$(nproc)
      - uses: actions/upload-artifact@v2
        with:
          name: default.xbe
          path: projects/xbox_kernel_test_suite/bin/default.xbe 
